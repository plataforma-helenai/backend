<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HelenAI — Conteudistas</title>
  <link rel="stylesheet" href="/assets/css/global.css">
  <link rel="stylesheet" href="/assets/css/componentes.css">
  <link rel="stylesheet" href="/assets/css/acessibilidade.css">
  <style>
    /* Filtros */
    .filtros-card {
      background: var(--branco);
      border-radius: var(--borda-radius-lg);
      box-shadow: var(--sombra-card);
      padding: var(--espacamento-md) var(--espacamento-lg);
      margin-bottom: var(--espacamento-lg);
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: var(--espacamento-md);
      align-items: end;
    }

    .filtro-grupo { display: flex; flex-direction: column; gap: 6px; }

    .filtro-label {
      font-size: var(--fonte-tamanho-xs);
      font-weight: 600;
      color: var(--texto-secundario);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .filtro-grupo input,
    .filtro-grupo select {
      padding: 10px 12px;
      border: 1px solid var(--borda-cor);
      border-radius: var(--borda-radius);
      font-size: var(--fonte-tamanho-sm);
      font-family: var(--fonte-principal);
      background: var(--branco);
    }

    /* Tabela */
    .tabela-card {
      background: var(--branco);
      border-radius: var(--borda-radius-lg);
      box-shadow: var(--sombra-card);
      overflow: hidden;
    }

    .tabela-header {
      padding: var(--espacamento-lg);
      border-bottom: 1px solid var(--borda-cor);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .tabela-header h3 {
      color: var(--azul-profundo);
      font-size: var(--fonte-tamanho-lg);
    }

    .tabela {
      width: 100%;
      border-collapse: collapse;
    }

    .tabela th {
      text-align: left;
      padding: var(--espacamento-md) var(--espacamento-lg);
      background: var(--cinza-azulado);
      font-size: var(--fonte-tamanho-xs);
      font-weight: 700;
      color: var(--texto-secundario);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--borda-cor);
    }

    .tabela td {
      padding: var(--espacamento-md) var(--espacamento-lg);
      border-bottom: 1px solid var(--borda-cor);
      font-size: var(--fonte-tamanho-sm);
      color: var(--texto-primario);
    }

    .tabela tr:last-child td { border-bottom: none; }

    .tabela tr:hover td { background: #F7FAFC; }

    .usuario-celula {
      display: flex;
      align-items: center;
      gap: var(--espacamento-sm);
    }

    .usuario-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--gradiente-principal);
      color: var(--branco);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--fonte-tamanho-xs);
      font-weight: 700;
      flex-shrink: 0;
    }

    .usuario-info .nome {
      font-weight: 600;
      color: var(--azul-profundo);
    }

    .usuario-info .email {
      font-size: var(--fonte-tamanho-xs);
      color: var(--texto-terciario);
    }

    .areas-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .area-tag {
      padding: 2px 8px;
      background: #EBF8FF;
      color: var(--azul-medio);
      border-radius: var(--borda-radius-full);
      font-size: 0.7rem;
      font-weight: 600;
    }

    .mini-stats {
      display: flex;
      gap: var(--espacamento-sm);
      font-size: var(--fonte-tamanho-xs);
      color: var(--texto-secundario);
    }

    .mini-stats span {
      display: inline-flex;
      align-items: center;
      gap: 2px;
    }

    .acoes-celula {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .empty-state {
      text-align: center;
      padding: var(--espacamento-2xl);
      color: var(--texto-terciario);
    }

    .empty-state .icone {
      font-size: 3rem;
      display: block;
      margin-bottom: var(--espacamento-md);
    }

    .resultados-count {
      font-size: var(--fonte-tamanho-sm);
      color: var(--texto-secundario);
      margin-bottom: var(--espacamento-md);
    }

    .resultados-count strong { color: var(--azul-profundo); }

    @media (max-width: 900px) {
      .filtros-card { grid-template-columns: 1fr; }
      .tabela th:nth-child(3),
      .tabela td:nth-child(3),
      .tabela th:nth-child(5),
      .tabela td:nth-child(5) { display: none; }
    }
  </style>
</head>
<body>

  <!-- Barra de Acessibilidade -->
  <div class="acessibilidade-bar">
    <button class="acessibilidade-btn" id="btn-contraste" title="Alto Contraste">◐</button>
    <button class="acessibilidade-btn" id="btn-dislexia" title="Fonte Dislexia">Aa</button>
    <div class="fonte-controles">
      <button class="acessibilidade-btn" id="btn-fonte-menos" title="Diminuir fonte">A-</button>
      <button class="acessibilidade-btn" id="btn-fonte-mais" title="Aumentar fonte">A+</button>
    </div>
    <div class="acessibilidade-separador"></div>
    <button class="acessibilidade-btn" id="btn-colorblind" title="Color Blind">👁</button>
    <button class="acessibilidade-btn" id="btn-ledor" title="Ledor">▶</button>
    <button class="acessibilidade-btn" id="btn-libras" title="LIBRAS">🤟</button>
  </div>

  <div class="ledor-player">
    <button id="ledor-play">▶ Ler</button><button id="ledor-pause">⏸ Pausar</button><button id="ledor-stop">⏹ Parar</button>
    <div class="acessibilidade-separador"></div>
    <button id="ledor-vel-menos">−</button><span class="velocidade-atual">1x</span><button id="ledor-vel-mais">+</button>
  </div>

  <div class="libras-janela">
    <div class="libras-janela-header"><span>LIBRAS</span><button id="libras-fechar">✕</button></div>
    <div class="libras-janela-corpo"><p>Intérprete virtual<br>de LIBRAS<br>(em desenvolvimento)</p></div>
  </div>

  <div class="layout">

    <aside class="sidebar">
      <div class="sidebar-logo">
        <img src="/assets/img/logo-helen.png" alt="HelenAI"><span>helen.ai</span>
      </div>
      <nav class="sidebar-nav">
        <a href="/admin/dashboard.html" class="sidebar-item">📊 Dashboard</a>
        <a href="/admin/conteudistas.html" class="sidebar-item ativo">👨‍🏫 Conteudistas</a>
        <a href="/admin/alunos.html" class="sidebar-item">👥 Alunos</a>
      </nav>
    </aside>

    <main class="conteudo-principal">

      <div class="conteudo-header">
        <div>
          <h1 class="conteudo-titulo">Conteudistas</h1>
          <p class="conteudo-subtitulo">Gerencie os professores e curadores da plataforma</p>
        </div>
        <a href="/admin/conteudista-form.html" class="btn btn-sucesso">+ Novo Conteudista</a>
      </div>

      <!-- Filtros -->
      <div class="filtros-card">
        <div class="filtro-grupo">
          <label class="filtro-label">Buscar</label>
          <input type="text" id="f-busca" placeholder="Nome, email ou instituição...">
        </div>
        <div class="filtro-grupo">
          <label class="filtro-label">Área de atuação</label>
          <select id="f-area">
            <option value="">Todas</option>
            <option>Matemática</option>
            <option>Linguagens</option>
            <option>Ciências da Natureza</option>
            <option>Ciências Humanas</option>
          </select>
        </div>
        <div class="filtro-grupo">
          <label class="filtro-label">Status</label>
          <select id="f-status">
            <option value="">Todos</option>
            <option value="ativo">Ativos</option>
            <option value="bloqueado">Bloqueados</option>
          </select>
        </div>
      </div>

      <div class="resultados-count" id="resultados-count"></div>

      <!-- Tabela -->
      <div class="tabela-card">
        <table class="tabela">
          <thead>
            <tr>
              <th>Conteudista</th>
              <th>Área de atuação</th>
              <th>Instituição</th>
              <th>Atividade</th>
              <th>Status</th>
              <th>Cadastro</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>

      <!-- Paginação -->
      <div class="paginacao">
        <button class="paginacao-item">←</button>
        <button class="paginacao-item ativo">1</button>
        <button class="paginacao-item">2</button>
        <button class="paginacao-item">3</button>
        <button class="paginacao-item">→</button>
      </div>

    </main>
  </div>

  <script src="/assets/js/fake-data.js"></script>
  <script src="/assets/js/acessibilidade.js"></script>
  <script src="/assets/js/navegacao.js"></script>
  <script>
    const conteudistas = HELEN_DATA.adminConteudistasLista;

    function iniciais(nome) {
      return nome.replace('Prof. ', '').split(' ').map(p => p[0]).filter(Boolean).slice(0, 2).join('').toUpperCase();
    }

    function formatarData(d) {
      const [ano, mes, dia] = d.split('-');
      return `${dia}/${mes}/${ano}`;
    }

    function renderTabela() {
      const busca = document.getElementById('f-busca').value.toLowerCase();
      const area = document.getElementById('f-area').value;
      const status = document.getElementById('f-status').value;

      const filtrados = conteudistas.filter(c => {
        if (busca && !`${c.nome} ${c.email} ${c.instituicao}`.toLowerCase().includes(busca)) return false;
        if (area && !c.areas.includes(area)) return false;
        if (status && c.status !== status) return false;
        return true;
      });

      const count = document.getElementById('resultados-count');
      count.innerHTML = filtrados.length === conteudistas.length
        ? `<strong>${filtrados.length}</strong> conteudistas cadastrados`
        : `Mostrando <strong>${filtrados.length}</strong> de ${conteudistas.length} conteudistas`;

      const tbody = document.getElementById('tbody');
      if (filtrados.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><span class="icone">🔍</span><p>Nenhum conteudista encontrado</p></div></td></tr>`;
        return;
      }

      tbody.innerHTML = filtrados.map(c => {
        const badge = c.status === 'ativo'
          ? '<span class="badge badge-ativo">Ativo</span>'
          : '<span class="badge badge-bloqueado">Bloqueado</span>';

        const btnBloqueio = c.status === 'ativo'
          ? '<button class="btn btn-perigo btn-sm" onclick="toggleStatus(' + c.id + ')">🔒 Bloquear</button>'
          : '<button class="btn btn-sucesso btn-sm" onclick="toggleStatus(' + c.id + ')">✓ Desbloquear</button>';

        return `
          <tr>
            <td>
              <div class="usuario-celula">
                <div class="usuario-avatar">${iniciais(c.nome)}</div>
                <div class="usuario-info">
                  <div class="nome">${c.nome}</div>
                  <div class="email">${c.email}</div>
                </div>
              </div>
            </td>
            <td>
              <div class="areas-tags">
                ${c.areas.map(a => `<span class="area-tag">${a}</span>`).join('')}
              </div>
            </td>
            <td style="font-size: var(--fonte-tamanho-xs);">
              <div style="color: var(--azul-profundo); font-weight: 600;">${c.instituicao}</div>
              <div style="color: var(--texto-terciario);">${c.formacao}</div>
            </td>
            <td>
              <div class="mini-stats">
                <span>❓ ${c.questoes}</span>
                <span>📝 ${c.simulados}</span>
                <span>👥 ${c.alunos}</span>
              </div>
            </td>
            <td>${badge}</td>
            <td style="font-size: var(--fonte-tamanho-xs); color: var(--texto-secundario);">${formatarData(c.dataCadastro)}</td>
            <td>
              <div class="acoes-celula">
                <a href="/admin/conteudista-form.html?id=${c.id}" class="btn btn-secundario btn-sm">✏ Editar</a>
                ${btnBloqueio}
              </div>
            </td>
          </tr>
        `;
      }).join('');
    }

    function toggleStatus(id) {
      const c = conteudistas.find(x => x.id === id);
      c.status = c.status === 'ativo' ? 'bloqueado' : 'ativo';
      renderTabela();
    }

    renderTabela();

    ['f-busca', 'f-area', 'f-status'].forEach(id => {
      document.getElementById(id).addEventListener('input', renderTabela);
      document.getElementById(id).addEventListener('change', renderTabela);
    });
  </script>

</body>
</html>
